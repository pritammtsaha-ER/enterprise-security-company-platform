apiVersion: v1
kind: Namespace
metadata:
  name: sg-securities-python
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sg-securities-python
  namespace: sg-securities-python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sg-securities-python
  template:
    metadata:
      labels:
        app: sg-securities-python
    spec:
      containers:
        - name: python-service
          image: sgsecurities-python:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sg-securities-python
  namespace: sg-securities-python
spec:
  selector:
    app: sg-securities-python
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sg-securities-python-ingress
  namespace: sg-securities-python
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: sg-securities-python.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sg-securities-python
                port:
                  number: 8000
